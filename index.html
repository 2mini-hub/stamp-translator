<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스탬프 번역기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #fff; min-height: 100vh; padding: 40px 16px; }
  h1 { text-align: center; color: #222; font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #999; font-size: 0.85rem; margin-bottom: 36px; }
  .upload-area {
    border: 2px dashed #ddd; border-radius: 16px; padding: 40px 32px;
    text-align: center; background: #fafafa; cursor: pointer;
    max-width: 600px; margin: 0 auto 24px; transition: all 0.2s;
  }
  .upload-area:hover { background: #f5f5f5; border-color: #bbb; }
  .upload-area p { color: #aaa; font-size: 0.9rem; margin-top: 8px; }
  .grid-input {
    max-width: 600px; margin: 0 auto 20px; display: flex;
    align-items: center; gap: 12px; background: #fafafa;
    border: 1.5px solid #eee; border-radius: 12px; padding: 16px 20px;
  }
  .grid-input label { color: #555; font-size: 0.9rem; white-space: nowrap; }
  .grid-input input {
    width: 64px; padding: 8px 10px; border: 1.5px solid #ddd;
    border-radius: 8px; font-size: 1rem; text-align: center; outline: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .grid-input input:focus { border-color: #888; }
  .grid-input span { color: #aaa; font-size: 0.85rem; }
  .btn {
    display: block; margin: 0 auto 12px; padding: 14px 32px;
    background: #222; color: white; border: none; border-radius: 12px;
    font-size: 1rem; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; max-width: 600px; width: 100%; transition: background 0.2s;
  }
  .btn:hover { background: #444; }
  .btn:disabled { background: #ddd; color: #aaa; cursor: not-allowed; }
  .status { text-align: center; color: #666; font-size: 0.9rem; margin: 12px 0; min-height: 20px; }
  .result-wrap { max-width: 900px; margin: 32px auto 0; text-align: center; }
  .result-wrap canvas { max-width: 100%; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
  .bottom-btns { max-width: 600px; margin: 24px auto 40px; display: flex; flex-direction: column; gap: 10px; }
  .btn-save {
    padding: 14px 32px; background: #1565c0; color: white; border: none;
    border-radius: 12px; font-size: 1rem; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; width: 100%; transition: background 0.2s;
  }
  .btn-save:hover { background: #0d47a1; }
  .excel-btn {
    padding: 14px 32px; background: #2e7d32; color: white; border: none;
    border-radius: 12px; font-size: 1rem; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; width: 100%; transition: background 0.2s;
  }
  .excel-btn:hover { background: #1b5e20; }
  #preview-img { max-width: 100%; max-height: 180px; display: block; margin: 12px auto 0; border-radius: 8px; }
</style>
</head>
<body>

<h1>스탬프 번역기</h1>
<p class="subtitle">일본어 스탬프 이미지를 업로드하면 한국어 번역을 병기해드려요</p>

<div class="upload-area" id="dropZone">
  <div style="font-size:2.5rem">🖼️</div>
  <p>이미지를 드래그하거나 클릭해서 업로드</p>
  <p style="font-size:0.75rem; color:#ccc; margin-top:4px">JPG, PNG, GIF 지원</p>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
  <img id="preview-img" style="display:none">
</div>

<div class="grid-input">
  <label>스탬프 배열</label>
  <input type="number" id="colCount" value="4" min="1" max="10">
  <span>열</span>
  <input type="number" id="rowCount" value="6" min="1" max="20">
  <span>행 → 총 <span id="totalCount">24</span>개</span>
</div>

<button class="btn" id="translateBtn" onclick="startTranslation()" disabled>번역 시작</button>
<div class="status" id="status"></div>

<div class="result-wrap" id="resultWrap" style="display:none">
  <canvas id="mergedCanvas"></canvas>
</div>

<div class="bottom-btns" id="bottomBtns" style="display:none">
  <button class="btn-save" onclick="downloadMerged()">🖼️ 통합 이미지 저장</button>
  <button class="excel-btn" onclick="downloadExcel()">📊 엑셀로 번역 목록 다운로드</button>
</div>

<script>
const WORKER_URL = "https://stamp-translator-api.90521.workers.dev";
let translationData = [];

document.getElementById('colCount').addEventListener('input', updateTotal);
document.getElementById('rowCount').addEventListener('input', updateTotal);
function updateTotal() {
  const c = parseInt(document.getElementById('colCount').value) || 0;
  const r = parseInt(document.getElementById('rowCount').value) || 0;
  document.getElementById('totalCount').textContent = c * r;
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = '#f5f5f5'; });
dropZone.addEventListener('dragleave', () => dropZone.style.background = '#fafafa');
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.style.background = '#fafafa';
  handleFiles(Array.from(e.dataTransfer.files));
});
fileInput.addEventListener('change', e => handleFiles(Array.from(e.target.files)));

function handleFiles(files) {
  const imgs = files.filter(f => f.type.startsWith('image/'));
  if (imgs.length > 0) {
    window._loadedFiles = imgs;
    setStatus(`${imgs.length}개 이미지 로드됨`);
    document.getElementById('translateBtn').disabled = false;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('preview-img');
      img.src = e.target.result; img.style.display = 'block';
    };
    reader.readAsDataURL(imgs[0]);
  }
}

async function startTranslation() {
  const files = window._loadedFiles;
  if (!files || files.length === 0) return;

  const cols = parseInt(document.getElementById('colCount').value) || 4;
  const rows = parseInt(document.getElementById('rowCount').value) || 6;
  const LABEL_HEIGHT = 52; // 번역 텍스트 공간 높이

  document.getElementById('translateBtn').disabled = true;
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('bottomBtns').style.display = 'none';
  translationData = [];

  const file = files[0];
  const img = await loadImage(file);
  const cellW = Math.floor(img.width / cols);
  const cellH = Math.floor(img.height / rows);

  // 출력 캔버스: 각 셀 아래에 라벨 공간 추가
  const output = document.getElementById('mergedCanvas');
  output.width = img.width;
  output.height = rows * (cellH + LABEL_HEIGHT);
  const outCtx = output.getContext('2d');

  // 배경 흰색
  outCtx.fillStyle = '#ffffff';
  outCtx.fillRect(0, 0, output.width, output.height);

  let stampIndex = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      stampIndex++;
      setStatus(`번역 중... (${stampIndex}/${cols * rows})`);

      const srcX = c * cellW;
      const srcY = r * cellH;
      const dstX = c * cellW;
      const dstY = r * (cellH + LABEL_HEIGHT);

      // 원본 스탬프 이미지 그리기
      outCtx.drawImage(img, srcX, srcY, cellW, cellH, dstX, dstY, cellW, cellH);

      // 셀 경계선 (연하게)
      outCtx.strokeStyle = '#eeeeee';
      outCtx.lineWidth = 1;
      outCtx.strokeRect(dstX, dstY, cellW, cellH + LABEL_HEIGHT);

      // 라벨 영역 배경
      outCtx.fillStyle = '#f9f9f9';
      outCtx.fillRect(dstX, dstY + cellH, cellW, LABEL_HEIGHT);

      // OCR
      const cellCanvas = document.createElement('canvas');
      cellCanvas.width = cellW; cellCanvas.height = cellH;
      const cellCtx = cellCanvas.getContext('2d');
      cellCtx.drawImage(img, srcX, srcY, cellW, cellH, 0, 0, cellW, cellH);
      const processed = preprocessImage(cellCanvas);
      const base64 = processed.toDataURL('image/png').split(',')[1];

      let fullText = '';
      try {
        const ocrRes = await fetch(`${WORKER_URL}/ocr`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageBase64: base64 }),
        });
        const ocrData = await ocrRes.json();
        const annotations = ocrData.responses?.[0]?.textAnnotations || [];
        fullText = annotations[0]?.description?.replace(/\n/g, '').trim() || '';
      } catch(e) { console.error('OCR 오류', e); }

      // 번역
      let korean = '';
      if (fullText) {
        try {
          const transRes = await fetch(`${WORKER_URL}/translate`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ texts: [fullText] }),
          });
          const transData = await transRes.json();
          korean = transData.data?.translations?.[0]?.translatedText || '';
        } catch(e) { console.error('번역 오류', e); }
      }

      translationData.push({ 번호: stampIndex, 일본어: fullText || '(텍스트 없음)', 한국어: korean || '' });

      // 라벨 영역에 번역 텍스트 그리기
      const labelY = dstY + cellH;
      const fontSize = Math.max(cellW * 0.065, 12);
      outCtx.font = `bold ${fontSize}px 'Noto Sans KR', sans-serif`;
      outCtx.textBaseline = 'middle';

      if (korean) {
        // 텍스트 줄바꿈 처리
        const lines = wrapText(outCtx, korean, cellW - 12, fontSize);
        const lineH = fontSize + 3;
        const totalH = lines.length * lineH;
        const startY = labelY + (LABEL_HEIGHT - totalH) / 2 + fontSize / 2;

        outCtx.fillStyle = '#cc0000';
        lines.forEach((line, li) => {
          outCtx.fillText(line, dstX + 6, startY + li * lineH);
        });
      } else {
        // 번역 없음 표시
        outCtx.fillStyle = '#cccccc';
        outCtx.font = `${fontSize * 0.85}px 'Noto Sans KR', sans-serif`;
        outCtx.fillText('(텍스트 없음)', dstX + 6, labelY + LABEL_HEIGHT / 2);
      }

      outCtx.textBaseline = 'alphabetic';
      await new Promise(r => setTimeout(r, 100));
    }
  }

  document.getElementById('resultWrap').style.display = 'block';
  document.getElementById('bottomBtns').style.display = 'flex';
  setStatus('✅ 번역 완료!');
  document.getElementById('translateBtn').disabled = false;
}

function preprocessImage(canvas) {
  const scaled = document.createElement('canvas');
  scaled.width = canvas.width * 2;
  scaled.height = canvas.height * 2;
  const ctx = scaled.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(canvas, 0, 0, scaled.width, scaled.height);
  ctx.filter = 'contrast(1.4) brightness(1.05)';
  ctx.drawImage(scaled, 0, 0);
  ctx.filter = 'none';
  return scaled;
}

function wrapText(ctx, text, maxWidth, fontSize) {
  const chars = text.split('');
  const lines = []; let line = '';
  for (let ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line); line = ch;
    } else { line = test; }
  }
  if (line) lines.push(line);
  return lines;
}

function loadImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.src = url;
  });
}

function downloadMerged() {
  const canvas = document.getElementById('mergedCanvas');
  const a = document.createElement('a');
  a.download = 'stamp_translated_all.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function downloadExcel() {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(translationData);
  ws['!cols'] = [{ wch: 8 }, { wch: 35 }, { wch: 35 }];
  XLSX.utils.book_append_sheet(wb, ws, '번역목록');
  XLSX.writeFile(wb, 'stamp_translations.xlsx');
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>
</body>
</html>
