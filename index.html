<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스탬프 번역기📝</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #ffffff;
    min-height: 100vh;
    padding: 40px 16px;
  }
  h1 {
    text-align: center;
    color: #222;
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center;
    color: #999;
    font-size: 0.85rem;
    margin-bottom: 36px;
  }
  .upload-area {
    border: 2px dashed #ddd;
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    background: #fafafa;
    cursor: pointer;
    max-width: 600px;
    margin: 0 auto 24px;
    transition: all 0.2s;
  }
  .upload-area:hover { background: #f5f5f5; border-color: #bbb; }
  .upload-area p { color: #aaa; font-size: 0.9rem; margin-top: 8px; }
  .btn {
    display: block;
    margin: 0 auto 12px;
    padding: 14px 32px;
    background: #222;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    max-width: 600px;
    width: 100%;
    transition: background 0.2s;
    letter-spacing: -0.3px;
  }
  .btn:hover { background: #444; }
  .btn:disabled { background: #ddd; color: #aaa; cursor: not-allowed; }
  .status {
    text-align: center;
    color: #666;
    font-size: 0.9rem;
    margin: 12px 0;
    min-height: 20px;
  }
  .results-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    max-width: 1200px;
    margin: 32px auto 0;
  }
  .result-card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    width: 320px;
  }
  .result-card canvas { width: 100%; display: block; }
  .card-actions { padding: 10px 12px; }
  .btn-download {
    width: 100%;
    padding: 9px;
    border-radius: 8px;
    border: none;
    font-size: 0.85rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    background: #222;
    color: white;
    transition: background 0.2s;
  }
  .btn-download:hover { background: #444; }
  .excel-btn {
    display: block;
    margin: 24px auto 40px;
    padding: 14px 32px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    max-width: 600px;
    width: 100%;
    transition: background 0.2s;
  }
  .excel-btn:hover { background: #1b5e20; }
  #preview-img {
    max-width: 100%;
    max-height: 180px;
    display: block;
    margin: 12px auto 0;
    border-radius: 8px;
  }
</style>
</head>
<body>

<h1>스탬프 번역기</h1>
<p class="subtitle">일본어 스탬프 이미지를 업로드하면 한국어 번역을 병기해드려요</p>

<div class="upload-area" id="dropZone">
  <div style="font-size:2.5rem">🖼️</div>
  <p>이미지를 드래그하거나 클릭해서 업로드</p>
  <p style="font-size:0.75rem; color:#ccc; margin-top:4px">JPG, PNG, GIF 지원</p>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
  <img id="preview-img" style="display:none">
</div>

<button class="btn" id="translateBtn" onclick="startTranslation()" disabled>
  번역 시작
</button>

<div class="status" id="status"></div>
<div class="results-grid" id="resultsGrid"></div>
<button class="excel-btn" id="excelBtn" onclick="downloadExcel()" style="display:none">
  📊 엑셀로 번역 목록 다운로드
</button>

<script>
const WORKER_URL = "https://stamp-translator-api.90521.workers.dev";

let loadedFiles = [];
let translationData = [];

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.background = '#f5f5f5'; });
dropZone.addEventListener('dragleave', () => dropZone.style.background = '#fafafa');
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.background = '#fafafa';
  handleFiles(Array.from(e.dataTransfer.files));
});
fileInput.addEventListener('change', e => handleFiles(Array.from(e.target.files)));

function handleFiles(files) {
  loadedFiles = files.filter(f => f.type.startsWith('image/'));
  if (loadedFiles.length > 0) {
    setStatus(`${loadedFiles.length}개 이미지 로드됨`);
    document.getElementById('translateBtn').disabled = false;
    if (loadedFiles.length === 1) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.getElementById('preview-img');
        img.src = e.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(loadedFiles[0]);
    }
  }
}

async function startTranslation() {
  if (loadedFiles.length === 0) return;
  document.getElementById('translateBtn').disabled = true;
  document.getElementById('resultsGrid').innerHTML = '';
  translationData = [];

  for (let i = 0; i < loadedFiles.length; i++) {
    setStatus(`처리 중... (${i + 1}/${loadedFiles.length})`);
    await processImage(loadedFiles[i], i);
  }

  setStatus('✅ 번역 완료!');
  if (translationData.length > 0) document.getElementById('excelBtn').style.display = 'block';
  document.getElementById('translateBtn').disabled = false;
}

async function processImage(file, fileIndex) {
  const base64 = await fileToBase64(file);
  const pureBase64 = base64.split(',')[1];

  const ocrRes = await fetch(`${WORKER_URL}/ocr`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imageBase64: pureBase64 }),
  });
  const ocrData = await ocrRes.json();
  const annotations = ocrData.responses?.[0]?.textAnnotations || [];

  if (annotations.length === 0) {
    setStatus(`⚠️ 텍스트를 찾지 못했어요`);
    return;
  }

  // 전체 텍스트 블록 단위로 처리 (분절 방지)
  // annotations[0] = 전체 인식 텍스트
  // annotations[1~] = 개별 단어 → 인접한 것끼리 묶어서 스탬프 단위로 그룹화
  const blocks = groupTextBlocks(annotations.slice(1), file);
  const texts = blocks.map(b => b.text);

  if (texts.length === 0) return;

  const transRes = await fetch(`${WORKER_URL}/translate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ texts }),
  });
  const transData = await transRes.json();
  const translations = transData.data?.translations || [];

  // 엑셀: 좌상단부터 번호 순서로
  blocks.forEach((block, i) => {
    translationData.push({
      번호: translationData.length + 1,
      일본어: block.text,
      한국어: translations[i]?.translatedText || '',
    });
  });

  const canvas = await drawOverlay(file, blocks, translations);
  renderCard(canvas, fileIndex);
}

// 인접한 텍스트 블록을 그룹화해서 하나의 문장으로 합치기
function groupTextBlocks(annotations, file) {
  if (annotations.length === 0) return [];

  // 이미지 크기 기준으로 근접 임계값 설정
  const groups = [];
  const used = new Set();

  // bounding box 중심점 계산
  const getCenterY = (ann) => {
    const verts = ann.boundingPoly.vertices;
    return ((verts[0].y || 0) + (verts[2].y || 0)) / 2;
  };
  const getCenterX = (ann) => {
    const verts = ann.boundingPoly.vertices;
    return ((verts[0].x || 0) + (verts[1].x || 0)) / 2;
  };
  const getHeight = (ann) => {
    const verts = ann.boundingPoly.vertices;
    return Math.abs((verts[2].y || 0) - (verts[0].y || 0));
  };

  for (let i = 0; i < annotations.length; i++) {
    if (used.has(i)) continue;
    const group = [i];
    used.add(i);

    const baseH = getHeight(annotations[i]);
    const threshold = baseH * 3;

    for (let j = i + 1; j < annotations.length; j++) {
      if (used.has(j)) continue;
      const dy = Math.abs(getCenterY(annotations[i]) - getCenterY(annotations[j]));
      const dx = Math.abs(getCenterX(annotations[i]) - getCenterX(annotations[j]));
      if (dy < threshold && dx < threshold * 4) {
        group.push(j);
        used.add(j);
      }
    }

    // 그룹 내 텍스트 합치기
    const text = group.map(idx => annotations[idx].description).join('');

    // 그룹 전체 bounding box
    const allVerts = group.flatMap(idx => annotations[idx].boundingPoly.vertices);
    const xs = allVerts.map(v => v.x || 0);
    const ys = allVerts.map(v => v.y || 0);
    const minX = Math.min(...xs);
    const minY = Math.min(...ys);
    const maxX = Math.max(...xs);
    const maxY = Math.max(...ys);

    groups.push({ text, minX, minY, maxX, maxY });
  }

  // 좌상단 기준 정렬 (위→아래, 좌→우)
  groups.sort((a, b) => a.minY - b.minY || a.minX - b.minX);
  return groups;
}

async function drawOverlay(file, blocks, translations) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const FONT_SIZE = Math.max(img.width * 0.022, 14); // 이미지 크기 기준 통일된 폰트 크기

      blocks.forEach((block, i) => {
        const korean = translations[i]?.translatedText || '';
        if (!korean) return;

        ctx.font = `bold ${FONT_SIZE}px 'Noto Sans KR', sans-serif`;
        ctx.strokeStyle = 'white';
        ctx.lineWidth = FONT_SIZE * 0.3;
        ctx.lineJoin = 'round';
        ctx.fillStyle = 'red';

        ctx.strokeText(korean, block.minX, block.minY - 4);
        ctx.fillText(korean, block.minX, block.minY - 4);
      });

      URL.revokeObjectURL(url);
      resolve(canvas);
    };
    img.src = url;
  });
}

function renderCard(canvas, index) {
  const grid = document.getElementById('resultsGrid');
  const card = document.createElement('div');
  card.className = 'result-card';
  card.appendChild(canvas);

  const actions = document.createElement('div');
  actions.className = 'card-actions';
  const dlBtn = document.createElement('button');
  dlBtn.className = 'btn-download';
  dlBtn.textContent = '⬇️ 이미지 저장';
  dlBtn.onclick = () => {
    const a = document.createElement('a');
    a.download = `translated_${index + 1}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  actions.appendChild(dlBtn);
  card.appendChild(actions);
  grid.appendChild(card);
}

function downloadExcel() {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(translationData);
  ws['!cols'] = [{ wch: 8 }, { wch: 35 }, { wch: 35 }];
  XLSX.utils.book_append_sheet(wb, ws, '번역목록');
  XLSX.writeFile(wb, 'stamp_translations.xlsx');
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
</script>
</body>
</html>
